<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"/>

  <script>tailwind.config={theme:{extend:{colors:{'ink-navy':'#0b1b33','circuit-blue':'#1652c4','signal-cyan':'#2fe6dd','mist':'#f4f7fb'},fontFamily:{display:['Space Grotesk','sans-serif'],body:['IBM Plex Sans','sans-serif'],mono:['IBM Plex Mono','monospace']}}}}</script>
  <style>
    .news-card{transition:transform .35s,box-shadow .35s,border-color .35s;}
    .news-card:hover{transform:translateY(-6px);box-shadow:0 24px 48px -20px rgba(11,27,51,.22);border-color:rgba(22,82,196,.3);}
    .tag-btn{transition:all .25s;} .tag-btn.active{color:#fff!important;}
  </style>
</head>
<body class="font-body antialiased" style="color:#0b1b33;background:#fff">
<div id="loading-screen"><p class="loader-mark">VLSI<span style="color:#2fe6dd">·</span>SIET</p><div class="loader-trace"></div></div>

<header id="site-header">
  <div class="max-w-screen-xl mx-auto px-5 lg:px-8 flex items-center justify-between">
    <a href="../index.html" class="flex items-center gap-3">
      <img src="../assets/images/college_logo.png" alt="SIET Logo" class="h-9 w-auto object-contain flex-shrink-0" onerror="this.src='https://via.placeholder.com/100x40?text=SIET'">
      <img src="../assets/images/department_logo.png" alt="VLSI Logo" class="h-9 w-auto object-contain flex-shrink-0" onerror="this.src='https://via.placeholder.com/100x40?text=VLSI'">
      <div><p class="brand-text font-display font-semibold text-sm transition-colors">SIET</p><p class="brand-text text-xs opacity-60 mt-0.5 transition-colors">VLSI Design and Technology</p></div>

    <nav class="hidden lg:flex items-center gap-1">
      <a href="../index.html" class="nav-link px-3.5 py-2 text-sm font-medium rounded-lg transition-all">Home</a>
      <a href="faculty.html"  class="nav-link px-3.5 py-2 text-sm font-medium rounded-lg transition-all">Faculty</a>
      <a href="students.html" class="nav-link px-3.5 py-2 text-sm font-medium rounded-lg transition-all">Students</a>
      <a href="events.html"   class="nav-link px-3.5 py-2 text-sm font-medium rounded-lg transition-all">Events</a>
      <a href="notices.html"  class="nav-link px-3.5 py-2 text-sm font-medium rounded-lg transition-all">Notices</a>
      <a href="contact.html"  class="nav-link px-3.5 py-2 text-sm font-medium rounded-lg transition-all">Contact</a>
    </nav>
    <a href="resources.html" class="hidden lg:inline-flex btn-primary text-sm font-semibold text-white rounded-xl" style="padding:.55rem 1.15rem">Resources</a>
    <button id="menu-toggle" class="lg:hidden nav-link w-10 h-10 flex items-center justify-center rounded-xl" aria-expanded="false" aria-label="Toggle menu">
      <i class="fa-solid fa-bars text-lg"></i><i class="fa-solid fa-xmark text-lg hidden"></i>
    </button>
  </div>
  <nav id="mobile-menu">
    <div class="max-w-screen-xl mx-auto px-5 pt-3 pb-5 flex flex-col gap-1" style="background:rgba(11,27,51,.96);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08)">
      <a href="../index.html" class="px-4 py-3 text-sm font-medium text-white/75 hover:text-white rounded-xl hover:bg-white/10 transition-all">Home</a>
      <a href="notices.html"  class="px-4 py-3 text-sm font-medium text-white/75 hover:text-white rounded-xl hover:bg-white/10 transition-all">Notices</a>

<main>
  <section class="relative flex items-end overflow-hidden" style="min-height:38vh;background:linear-gradient(135deg,#0b1b33 0%,#1652c4 100%);padding:8rem 1.25rem 3.5rem">
    <div aria-hidden="true" style="position:absolute;inset:0;opacity:.11"><svg width="100%" height="100%"><defs><pattern id="ph" width="80" height="80" patternUnits="userSpaceOnUse"><path d="M0 40H80M40 0V80" stroke="#2fe6dd" stroke-width="1" fill="none"/><circle cx="40" cy="40" r="2" fill="#2fe6dd"/></pattern></defs><rect width="100%" height="100%" fill="url(#ph)"/></svg></div>
    <div class="max-w-screen-xl mx-auto w-full relative z-10">
      <nav class="mb-4"><ol class="flex items-center gap-2 text-xs font-mono" style="color:rgba(255,255,255,.45)"><li><a href="../index.html" onmouseover="this.style.color='#2fe6dd'" onmouseout="this.style.color=''">Home</a></li><li><i class="fa-solid fa-chevron-right text-[10px]"></i></li><li style="color:#2fe6dd">News</li></ol></nav>
      <h1 class="font-display font-bold text-3xl md:text-5xl text-white">Department News</h1>
      <p class="mt-2 text-sm md:text-base" style="color:rgba(255,255,255,.55)">Achievements, partnerships, research updates, and department highlights</p>
    </div>
  </section>

  <section class="py-16 bg-white">
    <div class="max-w-screen-xl mx-auto px-5 lg:px-8">

      <!-- Filter + search -->
      <div class="flex flex-wrap items-center gap-3 mb-10" data-aos="fade-up">
        <div class="relative flex-1" style="min-width:200px;max-width:320px">
          <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-xs" style="color:#aab4c8"></i>
          <input type="search" id="news-search" placeholder="Search news…"
            style="width:100%;padding:.65rem 1rem .65rem 2.4rem;border:1.5px solid #e2e8f0;border-radius:.75rem;font-size:.82rem;outline:none;transition:all .25s"
            onfocus="this.style.borderColor='#1652c4';this.style.boxShadow='0 0 0 3px rgba(22,82,196,.1)'"
            onblur="this.style.borderColor='#e2e8f0';this.style.boxShadow=''"/>
        </div>
        <div class="flex flex-wrap gap-2">
          <button class="tag-btn active px-3.5 py-2 rounded-xl text-xs font-medium border" data-tag="all" style="background:#1652c4;border-color:#1652c4;color:#fff">All</button>
          <button class="tag-btn px-3.5 py-2 rounded-xl text-xs font-medium border" data-tag="Achievement" style="border-color:#e2e8f0;color:#5b6478">Achievement</button>
          <button class="tag-btn px-3.5 py-2 rounded-xl text-xs font-medium border" data-tag="Research" style="border-color:#e2e8f0;color:#5b6478">Research</button>
          <button class="tag-btn px-3.5 py-2 rounded-xl text-xs font-medium border" data-tag="Partnership" style="border-color:#e2e8f0;color:#5b6478">Partnership</button>
          <button class="tag-btn px-3.5 py-2 rounded-xl text-xs font-medium border" data-tag="Placements" style="border-color:#e2e8f0;color:#5b6478">Placements</button>
          <button class="tag-btn px-3.5 py-2 rounded-xl text-xs font-medium border" data-tag="Awards" style="border-color:#e2e8f0;color:#5b6478">Awards</button>
        </div>
      </div>

      <!-- Featured news (first item = large) -->
      <div id="featured-news" class="mb-10"></div>

      <!-- News grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="news-grid"></div>

      <p class="text-center mt-10 text-xs font-mono" style="color:#aab4c8" id="news-empty" style="display:none">No news found.</p>
    </div>
  </section>
</main>

<footer style="background:#0b1b33;padding:1.5rem;text-align:center;font-size:.78rem;color:rgba(255,255,255,.3)">
  <p>&copy; <span id="current-year">2026</span> VLSI Department, SIET &nbsp;·&nbsp; <a href="../index.html" style="color:rgba(255,255,255,.4)" onmouseover="this.style.color='#fff'" onmouseout="this.style.color=''">Back to Home</a></p>
</footer>
<button id="back-to-top" aria-label="Back to top"><i class="fa-solid fa-arrow-up text-sm"></i></button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script src="../js/main.js"></script>
<script>
AOS.init({duration:700,once:true,offset:60});

var tagColors={Achievement:'#1652c4',Research:'#0b6e8c',Partnership:'#166444',Placements:'#6416c4',Awards:'#8c4516',Events:'#c41652'};

var allNews=[
  {tag:'Achievement',date:'2026-06-25',title:'VLSI Team Wins First Place at National Robotics Championship 2026',body:'A four-member team of final-year VLSI students secured the top position at the National Robotics Championship held in Chennai. Their autonomous navigation robot, designed using ROS and LiDAR, outperformed 48 teams from premier engineering institutions across India.',featured:true},
  {tag:'Partnership', date:'2026-06-18',title:'Department Signs MoU with Nexora Semiconductors for VLSI Research Lab',body:'The department has formalised a partnership with Nexora Semiconductors to establish a dedicated VLSI Research Lab within the department. The collaboration includes access to Cadence EDA tools, internship pipelines, and joint research projects.'},
  {tag:'Research',    date:'2026-06-10',title:'Faculty Paper Accepted at IEEE International Signal Processing Conference',body:'A research paper on low-power signal compression authored by Dr. [Name] has been accepted for presentation at a leading IEEE-sponsored international conference.'},
  {tag:'Placements',  date:'2026-06-02',title:'12 Pre-Final Year Students Receive Early Placement Offers from Semiconductor Firms',body:'Twelve students from the third year received pre-placement offers from leading semiconductor and telecom companies during the department\'s mid-year recruitment drive.'},
  {tag:'Awards',      date:'2026-05-28',title:'Department Receives Best Technical Department Award at Annual Institute Day',body:'The VLSI department was recognised as the Best Technical Department at SIET\'s annual institute day, based on placement rate, research output, and student achievement index.'},
  {tag:'Research',    date:'2026-05-20',title:'DST-SERB Research Grant of ₹42 Lakhs Sanctioned for IoT Agriculture Project',body:'The Department of Science and Technology has sanctioned a ₹42 lakh research grant for an IoT-based precision agriculture project being led by Dr. [Name] from the department.'},
  {tag:'Achievement', date:'2026-05-15',title:'Student Secures Global Rank 87 in LeetCode Weekly Contest',body:'A second-year VLSI student achieved a global rank of 87 among 30,000+ participants in LeetCode Weekly Contest #420, making it one of the highest individual rankings from the department.'},
  {tag:'Partnership', date:'2026-05-08',title:'MoU Signed with Trident Embedded for Centre of Excellence',body:'SIET VLSI and Trident Embedded Systems signed an MoU to establish a Centre of Excellence in embedded systems within the department, featuring industry-sponsored hardware and mentorship.'},
  {tag:'Events',      date:'2026-05-01',title:'ELECNOVA 2026 Registration Opens — National Technical Symposium',body:'Registration for the annual national symposium ELECNOVA 2026 is now open. Events include paper presentation, project expo, circuit debugging, hackathon, and robotics challenge.'},
  {tag:'Awards',      date:'2026-04-22',title:'NBA Re-Accreditation Granted for Three-Year Cycle',body:'The department has successfully cleared the NBA re-accreditation review. The visiting committee commended the department\'s industry linkages, lab facilities, and faculty research output.'},
  {tag:'Achievement', date:'2026-04-15',title:'Final Year Project Featured in IEEE Tamil Nadu Section Newsletter',body:'The smart grid fault detection project built by a group of final-year students was featured in the IEEE Tamil Nadu Section\'s quarterly newsletter as a student innovation highlight.'},
];

var activeTag='all'; var searchQ='';

function fmtDate(iso){
  return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
}

function render(){
  var list=allNews.filter(function(n){
    var tagOk=activeTag==='all'||n.tag===activeTag;
    var qOk=!searchQ||(n.title+n.body).toLowerCase().includes(searchQ);
    return tagOk&&qOk;
  });

  document.getElementById('news-empty').style.display=list.length?'none':'block';

  // Featured (first item if no filter)
  var featEl=document.getElementById('featured-news');
  if(activeTag==='all'&&!searchQ&&list[0]&&list[0].featured){
    var f=list[0]; var cc=tagColors[f.tag]||'#1652c4';
    featEl.innerHTML=[
      '<div class="news-card surface-card rounded-3xl overflow-hidden" data-aos="fade-up">',
        '<div class="grid grid-cols-1 md:grid-cols-2">',
          '<div class="h-52 md:h-auto flex items-center justify-center relative" style="background:linear-gradient(145deg,'+cc+'dd,'+cc+');min-height:200px">',
            '<div aria-hidden="true" style="position:absolute;inset:0;opacity:.15"><svg width="100%" height="100%"><defs><pattern id="fn" width="50" height="50" patternUnits="userSpaceOnUse"><path d="M0 25H50M25 0V50" stroke="#2fe6dd" stroke-width=".8" fill="none"/></pattern></defs><rect width="100%" height="100%" fill="url(#fn)"/></svg></div>',
            '<i class="fa-solid fa-newspaper text-6xl relative z-10" style="color:rgba(255,255,255,.25)"></i>',
          '</div>',
          '<div class="p-8">',
            '<div class="flex items-center gap-2 mb-3">',
              '<span class="text-xs font-mono px-2.5 py-1 rounded-full text-white" style="background:'+cc+'">'+f.tag+'</span>',
              '<span class="text-xs font-mono" style="color:#aab4c8">'+fmtDate(f.date)+'</span>',
              '<span class="text-xs font-mono px-2 py-0.5 rounded-full" style="background:#2fe6dd;color:#0b1b33">FEATURED</span>',
            '</div>',
            '<h2 class="font-display font-bold text-xl leading-snug mb-3" style="color:#0b1b33">'+f.title+'</h2>',
            '<p class="text-sm leading-relaxed" style="color:#5b6478">'+f.body+'</p>',
          '</div>',
        '</div>',
      '</div>'
    ].join('');
    list=list.slice(1);
  } else { featEl.innerHTML=''; }

  // Grid
  document.getElementById('news-grid').innerHTML=list.map(function(n,i){
    var cc=tagColors[n.tag]||'#1652c4';
    return [
      '<article class="news-card surface-card rounded-2xl overflow-hidden" data-aos="fade-up" data-aos-delay="'+(i%3*70)+'">',
        '<div class="h-28 flex items-center justify-center relative" style="background:linear-gradient(145deg,'+cc+'cc,'+cc+')">',
          '<div aria-hidden="true" style="position:absolute;inset:0;opacity:.13"><svg width="100%" height="100%"><defs><pattern id="ng'+i+'" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M0 20H40M20 0V40" stroke="#2fe6dd" stroke-width=".7" fill="none"/></pattern></defs><rect width="100%" height="100%" fill="url(#ng'+i+')"/></svg></div>',
          '<i class="fa-solid fa-newspaper text-3xl relative z-10" style="color:rgba(255,255,255,.25)"></i>',
        '</div>',
        '<div class="p-5">',
          '<div class="flex items-center gap-2 mb-2.5">',
            '<span class="text-[10px] font-mono px-2 py-0.5 rounded-full text-white" style="background:'+cc+'">'+n.tag+'</span>',
            '<span class="text-[10px] font-mono" style="color:#aab4c8">'+fmtDate(n.date)+'</span>',
          '</div>',
          '<h3 class="font-display font-semibold text-sm leading-snug mb-2" style="color:#0b1b33">'+n.title+'</h3>',
          '<p class="text-xs leading-relaxed" style="color:#5b6478">'+n.body.substring(0,110)+'…</p>',
        '</div>',
      '</article>'
    ].join('');
  }).join('');
}
render();

document.querySelectorAll('.tag-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.tag-btn').forEach(function(b){b.classList.remove('active');b.style.background='';b.style.borderColor='#e2e8f0';b.style.color='#5b6478';});
    btn.classList.add('active'); btn.style.background='#1652c4'; btn.style.borderColor='#1652c4'; btn.style.color='#fff';
    activeTag=btn.dataset.tag; render();
  });
});
document.getElementById('news-search').addEventListener('input',function(){ searchQ=this.value.toLowerCase(); render(); });
</script>
</body>
</html>
