<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 — Page Not Found | VLSI SIET</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'IBM Plex Mono',monospace;background:#0b1b33;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .wrap{text-align:center;max-width:480px}
    .code{font-size:clamp(5rem,20vw,9rem);font-family:'Space Grotesk',sans-serif;font-weight:700;line-height:1;background:linear-gradient(135deg,#1652c4,#2fe6dd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .title{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:600;margin:.75rem 0}
    .sub{font-size:.8rem;color:rgba(255,255,255,.45);line-height:1.7;margin-bottom:2rem}
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.6rem;background:#1652c4;color:#fff;border-radius:.85rem;font-size:.82rem;font-weight:700;text-decoration:none;transition:background .25s}
    .btn:hover{background:#103e94}
    .trace{width:120px;height:2px;background:linear-gradient(90deg,transparent,#2fe6dd,transparent);margin:2rem auto 0;opacity:.4}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1 class="title">Page Not Found</h1>
    <p class="sub">Looks like this circuit has an open connection.<br/>The page you're looking for doesn't exist or has been moved.</p>
    <a href="index.html" class="btn"><i class="fa-solid fa-arrow-left" style="font-size:.75rem"></i> Back to Home</a>
    <div class="trace"></div>
  </div>
</body>
</html>
